<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acceso Corporativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <p class="subtitle">Ingrese las credenciales asignadas a su cuenta</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Dirección de Correo</label>
                <input type="email" id="email" required autocomplete="username" placeholder="nombre@empresa.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            
            <div id="alertMessage" class="alert-box hidden"></div>

            <button type="submit" class="btn-submit">Autenticar</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
