<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro Corporativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="login-container" role="main" aria-label="Login">
        <div class="header-block">
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">Accede a tu panel seguro con tu correo y contraseña.</p>
        </div>

        <form id="loginForm" novalidate>
            <div class="input-group" id="group-email">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" autocomplete="username" required placeholder="nombre@correo.com">
                <span class="field-error hidden" id="emailError"></span>
            </div>

            <div class="input-group" id="group-password">
                <label for="password">Contraseña</label>
                <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••">
                <span class="field-error hidden" id="passwordError"></span>
            </div>

            <div id="alertMessage" class="alert-box hidden" role="alert" aria-live="polite"></div>

            <button type="submit" class="btn-submit">Entrar</button>

            <div class="or-separator"><span>o</span></div>
            <div class="google-signin">
                <div id="googleButtonContainer"></div>
            </div>
        </form>

        <p class="help-text">¿No tienes cuenta? <a href="/register">Regístrate aquí</a></p>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
