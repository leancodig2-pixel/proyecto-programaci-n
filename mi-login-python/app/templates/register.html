<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="login-container" role="main" aria-label="Registro">
        <div class="header-block">
            <h2>Crear Cuenta</h2>
            <p class="subtitle">Regístrate para acceder de forma segura y profesional.</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="input-group" id="group-name">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" autocomplete="name" required placeholder="Tu nombre completo">
                <span class="field-error hidden" id="nameError"></span>
            </div>

            <div class="input-group" id="group-email">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" autocomplete="username" required placeholder="nombre@correo.com">
                <span class="field-error hidden" id="emailError"></span>
            </div>

            <div class="input-group" id="group-password">
                <label for="password">Contraseña</label>
                <input type="password" id="password" autocomplete="new-password" required placeholder="••••••••">
                <span class="field-error hidden" id="passwordError"></span>
            </div>

            <div class="input-group" id="group-confirm">
                <label for="confirm">Confirmar Contraseña</label>
                <input type="password" id="confirm" autocomplete="new-password" required placeholder="••••••••">
                <span class="field-error hidden" id="confirmError"></span>
            </div>

            <div id="alertMessage" class="alert-box hidden" role="alert" aria-live="polite"></div>

            <button type="submit" class="btn-submit">Registrar</button>
        </form>

        <p class="help-text">¿Ya tienes cuenta? <a href="/">Inicia sesión</a></p>
    </div>

    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
