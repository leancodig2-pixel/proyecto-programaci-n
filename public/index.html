<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Login Combinatorio Infinito</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <h2>Simulador de Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="name">Nombre de Usuario</label>
                <input type="text" id="name" required placeholder="Tu nombre completo">
            </div>
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="btnSubmit">Ingresar</button>
        </form>
        <div id="alertMessage" class="alert hidden"></div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
