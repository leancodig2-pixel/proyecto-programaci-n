<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros de inicio de sesión</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="centered-page">
    <div class="card wide">
        <h2>Registros recientes</h2>
        <table class="logs">
            <thead><tr><th>Correo</th><th>Éxito</th><th>Fecha (UTC)</th><th>IP</th></tr></thead>
            <tbody>
            {% for correo, success, timestamp, ip in rows %}
                <tr>
                    <td>{{ correo }}</td>
                    <td>{{ 'Sí' if success else 'No' }}</td>
                    <td>{{ timestamp }}</td>
                    <td>{{ ip }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <p class="mt-3"><a href="/dashboard">Volver</a></p>
    </div>
</body>
</html>
