<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Augusto</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-md text-white">
        <h2 class="text-3xl font-extrabold text-center mb-2 tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">¡Bienvenido!</h2>
        <p class="text-slate-400 text-center text-sm mb-8">Ingresa tus datos para acceder</p>
        {% if error %}
            <div class="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-lg text-sm text-center mb-6">{{ error }}</div>
        {% endif %}
        <form id="loginForm" action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Correo Electrónico</label>
                <input type="email" name="correo" id="correo" placeholder="augusto@correo.com" class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white focus:outline-none focus:border-blue-500 transition-all text-base">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Contraseña</label>
                <div class="relative">
                    <input type="password" name="contrasena" id="contrasena" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white focus:outline-none focus:border-blue-500 transition-all text-base">
                    <button type="button" id="togglePassword" class="absolute right-3 top-3.5 text-xs text-slate-400 hover:text-white">Ver</button>
                </div>
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 rounded-xl font-bold shadow-lg transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-white cursor-pointer">Iniciar Sesión</button>
        </form>
        <div class="mt-4 text-center">
            <a href="/register" class="text-sm text-sky-300 hover:underline">Crear cuenta</a>
        </div>
        <div class="mt-8 pt-6 border-t border-slate-700 text-center text-xs text-slate-400">
            <span class="font-bold text-emerald-400">Acceso Estático:</span> augusto@correo.com | 1234
        </div>
    </div>
    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('contrasena');
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleBtn.textContent = 'Ocultar';
                } else {
                    passwordInput.type = 'password';
                    toggleBtn.textContent = 'Ver';
                }
            });
        }
        const form = document.getElementById('loginForm');
        if (form) {
            form.addEventListener('submit', (e) => {
                const correo = document.getElementById('correo').value.trim();
                const contra = document.getElementById('contrasena').value.trim();
                if (!correo || !contra) {
                    e.preventDefault();
                    alert('Por favor, completa todos los campos, Augusto.');
                }
            });
        }
    </script>
</body>
</html>
